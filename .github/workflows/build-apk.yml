name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: '更新说明（可选）'
        required: false
        default: ''
  workflow_run:
    workflows: ["Sync upstream"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (dist)
        run: pnpm run build
        env:
          VITE_HIDE_BUILD_BADGE: '1'

      - name: Add Android platform
        run: npx cap add android || true
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Apply SullyOS launcher icon
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${spec%%:*}"
            size="${spec##*:}"
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert assets/icon.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Generate build tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sullyos-apk-${{ steps.date.outputs.date }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: SullyOS ${{ steps.date.outputs.date }}
          body: |
            SullyOS debug build (${{ steps.date.outputs.date }})

            ${{ github.event.inputs.release_notes }}

            Built from commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
