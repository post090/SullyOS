name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      # 纯文档改动不触发 APK 重建（避免改 README 也要等 10 分钟构建）
      # 注意：不能 ignore '.github/**' —— 那 workflow 自身改动会被自己拦住（狗咬尾巴）
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      release_notes:
        description: '更新说明（可选）'
        required: false
        default: ''
  workflow_run:
    workflows: ["Sync upstream"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 三种触发方式都允许：push 到 main / 手动 / sync upstream 完成后
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (dist)
        run: pnpm run build
        env:
          VITE_HIDE_BUILD_BADGE: '1'

      - name: Add Android platform
        run: npx cap add android || true
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Install fixed Android debug signing key
        shell: bash
        env:
          ANDROID_DEBUG_KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_B64" ]; then
            echo "Missing ANDROID_DEBUG_KEYSTORE_B64 repository secret" >&2
            exit 1
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_B64" | base64 --decode > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"

      - name: Apply SullyOS launcher icon
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${spec%%:*}"
            size="${spec##*:}"
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert public/icons/icon-512.png -resize "${size}x${size}" "$dir/sully_launcher.png"
          done
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          text = text.replace('android:icon="@mipmap/ic_launcher"', 'android:icon="@mipmap/sully_launcher"')
          text = text.replace('android:roundIcon="@mipmap/ic_launcher_round"', 'android:roundIcon="@mipmap/sully_launcher"')
          manifest.write_text(text, encoding='utf-8')
          if '@mipmap/sully_launcher' not in text:
              raise SystemExit('Failed to patch Android launcher icon references')
          PY
      - name: Build and sign Debug APK with fixed key
        working-directory: android
        shell: bash
        run: |
          ./gradlew assembleDebug --no-daemon -x lint
          APK="app/build/outputs/apk/debug/app-debug.apk"
          UNSIGNED_COPY="app/build/outputs/apk/debug/app-debug-gradle.apk"
          mv "$APK" "$UNSIGNED_COPY"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$APK" \
            "$UNSIGNED_COPY"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify --verbose --print-certs "$APK"
          rm -f "$UNSIGNED_COPY"


      - name: Generate build tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sullyos-apk-${{ steps.date.outputs.date }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: SullyOS ${{ steps.date.outputs.date }}
          body: |
            SullyOS debug build (${{ steps.date.outputs.date }})

            ${{ github.event.inputs.release_notes }}

            Built from commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
